name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage # Mandatory for SonarCloud to see coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2.1.1 # Use a stable versioned action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Generated from SonarCloud
        with:
          # Configuration is stored in sonar-project.properties
          args: >
            -Dsonar.projectKey=AreefShaik-prasthana_AI
            -Dsonar.organization=areefshaik-prasthana
